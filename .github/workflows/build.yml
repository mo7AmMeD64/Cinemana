name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Create Flutter project scaffold
        run: |
          cp -r . /tmp/myfiles
          flutter create --project-name cinemana_app --org com.cinemana /tmp/scaffold --platforms android
          cp -r /tmp/scaffold/android .
          rm -rf lib
          cp -r /tmp/myfiles/lib .
          cp /tmp/myfiles/pubspec.yaml .
          if [ -d "/tmp/myfiles/assets" ]; then
            cp -r /tmp/myfiles/assets .
          fi

      - name: Fix NDK version
        run: |
          python3 - << 'PYEOF'
          import re, os
          kts = "android/app/build.gradle.kts"
          groovy = "android/app/build.gradle"
          if os.path.exists(kts):
              content = open(kts).read()
              if "ndkVersion" not in content:
                  content = content.replace("android {", 'android {\n    ndkVersion = "27.0.12077973"', 1)
              else:
                  content = re.sub(r'ndkVersion\s*=\s*"[^"]*"', 'ndkVersion = "27.0.12077973"', content)
              open(kts, "w").write(content)
              idx = content.find("android {")
              print(content[idx:idx+200])
          elif os.path.exists(groovy):
              content = open(groovy).read()
              if "ndkVersion" not in content:
                  content = content.replace("android {", 'android {\n    ndkVersion "27.0.12077973"', 1)
              else:
                  content = re.sub(r'ndkVersion\s+"[^"]*"', 'ndkVersion "27.0.12077973"', content)
              open(groovy, "w").write(content)
          PYEOF

      - name: Update AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-feature android:name="android.software.leanback" android:required="false"/>
              <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>
              <application
                  android:label="سينمانا"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:hardwareAccelerated="true"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize"
                      android:theme="@style/LaunchTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          MANIFEST

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: Cinemana-APK
          path: build/app/outputs/flutter-apk/app-release.apk
