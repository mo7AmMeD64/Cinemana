name: cinemana_app
description: سينمانا - أفلام ومسلسلات مع مشغل متكامل
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # شبكة وصور
  http: ^1.2.1
  cached_network_image: ^3.3.1

  # مشغل الفيديو
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.2

  # ترجمة

  # تخزين محلي
  shared_preferences: ^2.2.3

  # واجهة
  shimmer: ^3.0.0
  provider: ^6.1.2

  # فتح روابط
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
